<!DOCTYPE html>
<html lang="en">

<head>
  <script>
  window.addEventListener("error", function (e) {
    var box = document.createElement("div");
    box.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:12px;font-size:12px;white-space:pre-wrap;word-break:break-word;";
    box.innerText = "JS ERROR: " + e.message + " | file: " + e.filename + " | line: " + e.lineno;
    document.body.appendChild(box);
  });
  window.addEventListener("unhandledrejection", function (e) {
    var box = document.createElement("div");
    box.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:12px;font-size:12px;white-space:pre-wrap;word-break:break-word;";
    box.innerText = "PROMISE ERROR: " + (e.reason && e.reason.message ? e.reason.message : e.reason);
    document.body.appendChild(box);
  });
</script>
